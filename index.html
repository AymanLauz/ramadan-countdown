<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>🌙 Ramadan 2026 Countdown</title>
  <link rel="apple-touch-icon" id="apple-touch-icon" href="">
  <link rel="icon" id="favicon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='80'>🌙</text></svg>">
  <script>
    (function() {
      var canvas = document.createElement('canvas');
      canvas.width = 180; canvas.height = 180;
      var ctx = canvas.getContext('2d');
      ctx.fillStyle = '#0D1117';
      ctx.beginPath();
      ctx.roundRect(0, 0, 180, 180, 36);
      ctx.fill();
      ctx.font = '120px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('🌙', 90, 95);
      var png = canvas.toDataURL('image/png');
      document.getElementById('apple-touch-icon').href = png;
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #C9A96E;
      --gold-light: #E8C97A;
      --cream: #F5ECD7;
      --bg: #0D1117;
      --bg2: #141B24;
      --accent: #1A6B5C;
    }

    body {
      background: var(--bg);
      color: var(--cream);
      font-family: 'Tajawal', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(26,107,92,0.15) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 50% 100%, rgba(201,169,110,0.08) 0%, transparent 60%);
      pointer-events: none;
    }

    .moon {
      position: fixed;
      top: -40px;
      right: -40px;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      box-shadow: -30px 30px 0 10px rgba(201,169,110,0.08);
      border: 1px solid rgba(201,169,110,0.1);
      pointer-events: none;
    }

    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }
    .star {
      position: absolute;
      background: var(--gold-light);
      border-radius: 50%;
      animation: twinkle var(--d, 3s) ease-in-out infinite;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(1.3); }
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 2rem 1.5rem;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
    }

    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
    }
    .ramadan-title {
      font-family: 'Amiri', serif;
      font-size: clamp(2.6rem, 10vw, 3.4rem);
      color: var(--gold-light);
      letter-spacing: 0.05em;
      line-height: 1;
    }
    .ramadan-subtitle {
      font-size: clamp(0.75rem, 3vw, 0.9rem);
      color: rgba(245,236,215,0.5);
      letter-spacing: 0.25em;
      text-transform: uppercase;
    }

    .date-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.1rem;
      padding: 0.4rem 0;
    }
    .day-name {
      font-size: clamp(1.9rem, 7.5vw, 2.3rem);
      font-weight: 700;
      color: var(--cream);
    }
    .date-display {
      font-size: clamp(1.1rem, 4.5vw, 1.35rem);
      color: rgba(245,236,215,0.55);
      letter-spacing: 0.08em;
    }

    .ornament {
      color: var(--gold);
      font-size: 1.1rem;
      opacity: 0.6;
      letter-spacing: 0.4em;
    }

    .countdown-label {
      font-family: 'Amiri', serif;
      font-size: clamp(1rem, 4vw, 1.3rem);
      font-weight: 700;
      letter-spacing: 0.06em;
      background: linear-gradient(160deg, var(--gold-light) 0%, var(--gold) 60%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      opacity: 0.85;
    }

    .countdown-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      width: 100%;
    }
    .countdown {
      font-family: 'Amiri', serif;
      font-size: clamp(4.5rem, 18vw, 6.5rem);
      font-weight: 700;
      letter-spacing: 0.04em;
      line-height: 1;
      background: linear-gradient(160deg, var(--gold-light) 0%, var(--gold) 60%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: pulse 1s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.85; }
    }
    .time-labels {
      display: flex;
      gap: 0;
      width: 100%;
      justify-content: center;
    }
    .time-label {
      flex: 1;
      font-size: clamp(0.6rem, 2.5vw, 0.7rem);
      color: rgba(245,236,215,0.35);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-align: center;
    }

    .progress-section {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .progress-outer {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      width: 100%;
    }
    .progress-labels-row {
      display: flex;
      justify-content: space-between;
      width: 100%;
      margin-top: 0.05rem;
    }
    .progress-time-value {
      font-family: 'Amiri', serif;
      font-size: clamp(1rem, 4vw, 1.2rem);
      font-weight: 700;
      color: var(--cream);
      line-height: 1;
    }
    .progress-time-label {
      font-size: clamp(0.55rem, 2.2vw, 0.65rem);
      color: rgba(245,236,215,0.35);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .progress-bar-bg {
      flex: 1;
      height: 4px;
      background: rgba(255,255,255,0.06);
      border-radius: 100px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--gold));
      border-radius: 100px;
      transition: width 1s linear;
    }
    .progress-pct-label {
      text-align: center;
      font-size: clamp(0.7rem, 2.8vw, 0.82rem);
      color: rgba(245,236,215,0.45);
      letter-spacing: 0.08em;
    }
    .progress-pct-label span {
      color: var(--gold-light);
      font-weight: 700;
    }

    .ramadan-days-section {
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(201,169,110,0.18);
      border-radius: 18px;
      padding: 1rem 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .ramadan-days-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }
    .ramadan-days-stat {
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
    }
    .ramadan-days-label {
      font-size: clamp(0.58rem, 2.3vw, 0.68rem);
      color: rgba(245,236,215,0.35);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    .ramadan-days-number {
      font-family: 'Amiri', serif;
      font-size: clamp(2rem, 8vw, 2.6rem);
      font-weight: 700;
      line-height: 1;
      background: linear-gradient(160deg, var(--gold-light), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .ramadan-days-number.eid {
      background: linear-gradient(160deg, #7EDDD0, #5ECFB8);
      -webkit-background-clip: text;
      background-clip: text;
    }
    .ramadan-days-sublabel {
      font-size: clamp(0.62rem, 2.5vw, 0.72rem);
      color: var(--gold);
      opacity: 0.75;
    }
    .ramadan-days-sublabel.eid { color: rgba(94,207,184,0.65); }
    .days-progress-bar-bg {
      width: 100%;
      height: 6px;
      background: rgba(255,255,255,0.06);
      border-radius: 100px;
      overflow: hidden;
    }
    .days-progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--gold-light));
      border-radius: 100px;
      transition: width 0.5s ease;
    }
    .days-ticks {
      display: flex;
      justify-content: space-between;
      padding: 0 1px;
    }
    .days-tick {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(255,255,255,0.07);
      flex-shrink: 0;
    }
    .days-tick.filled {
      background: rgba(201,169,110,0.5);
    }

    .footer-credit {
      font-size: clamp(0.6rem, 2.3vw, 0.72rem);
      color: rgba(245,236,215,0.2);
      text-align: center;
      letter-spacing: 0.1em;
      padding: 1.5rem 0 1rem;
    }

    .table-drawer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 85vh;
      background: #0f1620;
      border-top: 1px solid rgba(201,169,110,0.25);
      border-radius: 20px 20px 0 0;
      z-index: 100;
      transform: translateY(100%);
      transition: transform 0.45s cubic-bezier(0.32, 0.72, 0, 1);
      display: flex;
      flex-direction: column;
      touch-action: none;
    }
    .table-drawer.open {
      transform: translateY(0);
    }
    .drawer-handle-bar {
      width: 36px; height: 4px;
      background: rgba(201,169,110,0.3);
      border-radius: 100px;
      margin: 0.75rem auto 0;
      flex-shrink: 0;
    }
    .drawer-title {
      font-family: 'Amiri', serif;
      font-size: 1.1rem;
      color: var(--gold-light);
      text-align: center;
      padding: 0.5rem 0 0.75rem;
      flex-shrink: 0;
      letter-spacing: 0.05em;
    }
    .drawer-scroll {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 0 0.8rem 2rem;
    }
    .ramadan-table {
      width: 100%;
      border-collapse: collapse;
      font-family: 'Tajawal', sans-serif;
      font-size: clamp(0.78rem, 3vw, 0.9rem);
    }
    .ramadan-table thead th {
      padding: 0.5rem 0.4rem;
      color: rgba(201,169,110,0.5);
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      text-align: center;
    }
    .ramadan-table tbody tr {
      border-bottom: 1px solid rgba(255,255,255,0.04);
      transition: background 0.2s;
    }
    .ramadan-table tbody td {
      padding: 0.55rem 0.4rem;
      text-align: center;
      color: var(--cream);
    }
    .ramadan-table tbody tr.past td {
      color: rgba(245,236,215,0.2);
    }
    .ramadan-table tbody tr.today {
      background: rgba(201,169,110,0.08);
      border-radius: 8px;
    }
    .ramadan-table tbody tr.today td {
      color: var(--gold-light);
      font-weight: 700;
    }
    .ramadan-table tbody tr.today td:first-child {
      border-left: 2px solid var(--gold);
    }
    .drawer-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 99;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s;
    }
    .drawer-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }
    .schedule-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      background: rgba(201,169,110,0.1);
      border: 1px solid rgba(201,169,110,0.35);
      border-radius: 100px;
      padding: 0.7rem 1.6rem;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      transition: background 0.2s, transform 0.15s;
      margin: 0.2rem auto 0;
      width: fit-content;
    }
    .schedule-btn:active { transform: scale(0.95); background: rgba(201,169,110,0.2); }
    .schedule-btn-text {
      font-family: 'Tajawal', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(201,169,110,0.8);
      line-height: 1;
    }
  </style>
</head>
<body>

  <div class="moon"></div>
  <div class="stars" id="stars"></div>

  <div class="container">
    <div class="header">
      <div class="ramadan-title">رمضان ١٤٤٧</div>
      <div class="ramadan-subtitle">Ramadan 2026</div>
    </div>

    <div class="date-card">
      <div class="day-name" id="dayName">--</div>
      <div class="date-display" id="dateDisplay">--</div>
    </div>

    <div class="ornament">✦ ✦ ✦</div>

    <div class="countdown-wrap">
      <div class="countdown-label" id="countdownLabel">--</div>
      <div class="countdown" id="countdown">--:--:--</div>
      <div class="time-labels">
        <div class="time-label">Hours</div>
        <div class="time-label">Mins</div>
        <div class="time-label">Secs</div>
      </div>
    </div>

    <div class="progress-section">
      <div class="progress-outer">
        <div class="progress-time-value" id="valLeft">--:--</div>
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
        </div>
        <div class="progress-time-value" id="valRight">--:--</div>
      </div>
      <div class="progress-labels-row">
        <div class="progress-time-label" id="labelLeft">Fajr</div>
        <div class="progress-time-label" id="labelRight">Maghrib</div>
      </div>
      <div class="progress-pct-label" id="progressPctLabel"></div>
    </div>

    <div class="ramadan-days-section">
      <div class="ramadan-days-top">
        <div class="ramadan-days-stat">
          <div class="ramadan-days-label">Days Fasted</div>
          <div class="ramadan-days-number" id="daysFasted">--</div>
          <div class="ramadan-days-sublabel">of 30 days</div>
        </div>
        <div class="ramadan-days-stat" style="align-items:center">
          <div class="ramadan-days-label">Until Bayram</div>
          <div class="ramadan-days-number eid" id="daysToEid">--</div>
          <div class="ramadan-days-sublabel eid">days remaining</div>
        </div>
      </div>
      <div class="days-progress-bar-bg">
        <div class="days-progress-bar-fill" id="daysProgressFill" style="width:0%"></div>
      </div>
      <div class="days-ticks" id="daysTicks"></div>
    </div>

    <div class="schedule-btn" id="scheduleBtn">
      <span class="schedule-btn-text">Full Month Schedule</span>
    </div>

    <div class="footer-credit"><br><br>Created and Designed by<br>Ayman Lauz</div>
  </div>

  <div class="drawer-overlay" id="drawerOverlay"></div>

  <div class="table-drawer" id="tableDrawer">
    <div class="drawer-handle-bar" id="drawerHandle"></div>
    <div class="drawer-title">Full Month Schedule</div>
    <div class="drawer-scroll">
      <table class="ramadan-table" id="ramadanTable">
        <thead>
          <tr>
            <th>#</th>
            <th>Day</th>
            <th>Date</th>
            <th>Fajr</th>
            <th>Maghrib</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

  <script>
    const starsEl = document.getElementById('stars');
    for (let i = 0; i < 30; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const size = Math.random() * 2.5 + 1;
      s.style.cssText = `
        width:${size}px; height:${size}px;
        top:${Math.random()*100}%;
        left:${Math.random()*100}%;
        --d:${2 + Math.random()*4}s;
        animation-delay:${Math.random()*4}s;
      `;
      starsEl.appendChild(s);
    }

    const ramadanTimes = {
      1: {
        18: { fajr: "04:57", maghrib: "17:33" },
        19: { fajr: "04:56", maghrib: "17:34" },
        20: { fajr: "04:55", maghrib: "17:35" },
        21: { fajr: "04:54", maghrib: "17:36" },
        22: { fajr: "04:53", maghrib: "17:36" },
        23: { fajr: "04:52", maghrib: "17:37" },
        24: { fajr: "04:51", maghrib: "17:38" },
        25: { fajr: "04:50", maghrib: "17:39" },
        26: { fajr: "04:49", maghrib: "17:40" },
        27: { fajr: "04:48", maghrib: "17:40" },
        28: { fajr: "04:46", maghrib: "17:41" }
      },
      2: {
        1: { fajr: "04:44", maghrib: "17:43" },
        2: { fajr: "04:43", maghrib: "17:44" },
        3: { fajr: "04:42", maghrib: "17:44" },
        4: { fajr: "04:41", maghrib: "17:45" },
        5: { fajr: "04:40", maghrib: "17:46" },
        6: { fajr: "04:30", maghrib: "17:47" },
        7: { fajr: "04:37", maghrib: "17:47" },
        8: { fajr: "04:36", maghrib: "17:48" },
        9: { fajr: "04:35", maghrib: "17:49" },
        10: { fajr: "04:34", maghrib: "17:50" },
        11: { fajr: "04:32", maghrib: "17:50" },
        12: { fajr: "04:31", maghrib: "17:51" },
        13: { fajr: "04:30", maghrib: "17:52" },
        14: { fajr: "04:28", maghrib: "17:53" },
        15: { fajr: "04:27", maghrib: "17:53" },
        16: { fajr: "04:26", maghrib: "17:54" },
        17: { fajr: "04:24", maghrib: "17:55" },
        18: { fajr: "04:23", maghrib: "17:55" },
        19: { fajr: "04:22", maghrib: "17:56" },
        20: { fajr: "04:20", maghrib: "17:57" }
      }
    };

    function updateCountdown() {
      const now = new Date();
      const month = now.getMonth();
      const day = now.getDate();

      let targetMonth = month;
      let targetDay = day;
      if (now.getFullYear() !== 2026 || !ramadanTimes[month] || !ramadanTimes[month][day]) {
        targetMonth = 1;
        targetDay = 18;
      }

      const todayTimes = ramadanTimes[targetMonth][targetDay];
      const fajrDate = new Date(2026, targetMonth, targetDay, ...todayTimes.fajr.split(":"));
      const maghribDate = new Date(2026, targetMonth, targetDay, ...todayTimes.maghrib.split(":"));

      let targetDate, label, progressPct = 0;

      if (now < fajrDate) {
        targetDate = fajrDate;
        label = "Until Fast Begins · Fajr";
        let prevMaghribDate;
        let prevMaghribTimeStr = todayTimes.maghrib;
        if (targetMonth === 1 && targetDay === 18) {
          prevMaghribDate = new Date(2026, targetMonth, targetDay - 1, ...todayTimes.fajr.split(":"));
        } else {
          let prevDay = targetDay - 1;
          let prevMonth = targetMonth;
          if (prevDay < 1) { prevMonth = 1; prevDay = 28; }
          const prevTimes = ramadanTimes[prevMonth][prevDay];
          prevMaghribDate = new Date(2026, prevMonth, prevDay, ...prevTimes.maghrib.split(":"));
          prevMaghribTimeStr = prevTimes.maghrib;
        }
        progressPct = Math.min(100, Math.max(0, ((now - prevMaghribDate) / (fajrDate - prevMaghribDate)) * 100));
        document.getElementById('labelLeft').textContent = 'Maghrib';
        document.getElementById('valLeft').textContent = prevMaghribTimeStr;
        document.getElementById('labelRight').textContent = 'Fajr';
        document.getElementById('valRight').textContent = todayTimes.fajr;
        document.getElementById('progressPctLabel').innerHTML = `<span>${progressPct.toFixed(0)}%</span> of Fatar elapsed`;
      } else if (now < maghribDate) {
        targetDate = maghribDate;
        label = "Fasting time · Until Iftar";
        progressPct = Math.min(99.9, Math.max(0, ((now - fajrDate) / (maghribDate - fajrDate)) * 100));
        document.getElementById('labelLeft').textContent = 'Fajr';
        document.getElementById('valLeft').textContent = todayTimes.fajr;
        document.getElementById('labelRight').textContent = 'Maghrib';
        document.getElementById('valRight').textContent = todayTimes.maghrib;
        document.getElementById('progressPctLabel').innerHTML = `<span>${Math.floor(progressPct)}%</span> of fast completed`;
      } else {
        let nextDay = targetDay + 1, nextMonth = targetMonth;
        if (!ramadanTimes[targetMonth][nextDay]) { nextDay = 1; nextMonth = targetMonth + 1; }
        const tomorrowTimes = ramadanTimes[nextMonth] && ramadanTimes[nextMonth][nextDay];
        if (!tomorrowTimes) {
          document.getElementById("countdownLabel").textContent = "Ramadan Complete 🌙";
          document.getElementById("countdown").textContent = "✓";
          return;
        }
        targetDate = new Date(2026, nextMonth, nextDay, ...tomorrowTimes.fajr.split(":"));
        label = "Until Tomorrow's Fajr";
        progressPct = Math.min(100, Math.max(0, ((now - maghribDate) / (targetDate - maghribDate)) * 100));
        document.getElementById('labelLeft').textContent = 'Maghrib';
        document.getElementById('valLeft').textContent = todayTimes.maghrib;
        document.getElementById('labelRight').textContent = 'Fajr';
        document.getElementById('valRight').textContent = tomorrowTimes.fajr;
        document.getElementById('progressPctLabel').innerHTML = `<span>${progressPct.toFixed(0)}%</span> of Fatar elapsed`;
      }

      document.getElementById('progressFill').style.width = progressPct + '%';
      const dayNames = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
      document.getElementById("dayName").textContent = dayNames[now.getDay()];
      document.getElementById("dateDisplay").textContent = now.toLocaleDateString('en-GB', { day: '2-digit', month: 'long', year: 'numeric' });
      document.getElementById("countdownLabel").textContent = label;
      const distance = targetDate - now;
      const h = Math.floor(distance / 3600000).toString().padStart(2, '0');
      const m = Math.floor((distance % 3600000) / 60000).toString().padStart(2, '0');
      const s = Math.floor((distance % 60000) / 1000).toString().padStart(2, '0');
      document.getElementById("countdown").textContent = `${h}:${m}:${s}`;
    }

    setInterval(updateCountdown, 1000);
    updateCountdown();

    function updateRamadanDays() {
      const RAMADAN_START = new Date(2026, 1, 18), EID_DATE = new Date(2026, 2, 20), TOTAL_DAYS = 30;
      const now = new Date(), today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const elapsed = Math.floor((today - RAMADAN_START) / 86400000);
      const timesRef = ramadanTimes[now.getMonth()] && ramadanTimes[now.getMonth()][now.getDate()];
      let maghribPassedToday = false;
      if (timesRef) {
        const [mh, mm] = timesRef.maghrib.split(':').map(Number);
        maghribPassedToday = now >= new Date(now.getFullYear(), now.getMonth(), now.getDate(), mh, mm);
      }
      const fasted = Math.min(TOTAL_DAYS, Math.max(1, elapsed + (maghribPassedToday ? 1 : 0)));
      const toEid = Math.max(0, Math.ceil((EID_DATE - today) / 86400000) - (maghribPassedToday ? 1 : 0));
      document.getElementById('daysFasted').textContent = fasted;
      document.getElementById('daysToEid').textContent = toEid;
      document.getElementById('daysProgressFill').style.width = Math.min(100, (elapsed / TOTAL_DAYS) * 100) + '%';
      const ticksEl = document.getElementById('daysTicks');
      if (!ticksEl.childElementCount) {
        for (let i = 0; i <= TOTAL_DAYS; i += 5) {
          const dot = document.createElement('div');
          dot.className = 'days-tick' + (elapsed >= i ? ' filled' : '');
          ticksEl.appendChild(dot);
        }
      }
    }
    updateRamadanDays();
    setInterval(updateRamadanDays, 60000);

    const dayNames = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"], monthNames = ["","Feb","Mar"];
    const tbody = document.getElementById('tableBody'), now0 = new Date();
    let todayRowEl = null;
    allDays.forEach((d, i) => {
      const date = new Date(2026, d.month, d.day);
      const maghribDt = new Date(2026, d.month, d.day, ...d.maghrib.split(':').map(Number));
      const isPast = now0 > maghribDt, isToday = (now0.getFullYear()===2026 && now0.getMonth()===d.month && now0.getDate()===d.day);
      const tr = document.createElement('tr');
      tr.className = isPast ? 'past' : (isToday ? 'today' : '');
      tr.innerHTML = `<td>${i+1}</td><td>${dayNames[date.getDay()]}</td><td>${d.day} ${monthNames[d.month]}</td><td>${d.fajr}</td><td>${d.maghrib}</td>`;
      tbody.appendChild(tr);
      if (isToday) todayRowEl = tr;

    const drawer = document.getElementById('tableDrawer'), overlay = document.getElementById('drawerOverlay'), btn = document.getElementById('scheduleBtn');
    function openDrawer() { 
      drawer.classList.add('open'); overlay.classList.add('visible');
      if (todayRowEl) setTimeout(() => todayRowEl.scrollIntoView({block:'center',behavior:'smooth'}), 350);

    function closeDrawer() { drawer.classList.remove('open'); overlay.classList.remove('visible'); }
